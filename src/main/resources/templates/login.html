<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
<link rel ="icon"href="https://cdn-icons-png.flaticon.com/512/295/295128.png">
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
		  <link rel="stylesheet"
		  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	  	  
		  <style>
		  .form-control {
		      background-color: #f0f8ff;   /* Light blue */
		      border: 1px solid #1877F2;   /* Blue border */
		  }

		  .form-control:focus {
		      border-color: #0d6efd;
		      box-shadow: 0 0 5px rgba(13,110,253,0.5);
		  }
		  </style>

		  
		  
</head>

<body style=" background-color:#d7dbdd">

<div class="container">
    <div class="row mt-5">
        <div class="col-md-4 offset-md-4 card login-card">
			
            
                <div class="card-body">
					
					<div class="container text-center">
						<img src="https://cdn-icons-png.flaticon.com/512/295/295128.png"
						     width="80"
						     alt="Login Icon">

                    <h3 class="text-center">Login Here</h3>
					</div>
                     
					<div th:if="${error}" 
					     class="alert alert-danger alert-dismissible fade show text-center mt-3" 
					     role="alert">
					     
					    Invalid username or password, please try again.
					    
					    <button type="button" class="btn-close" 
					            data-bs-dismiss="alert"></button>
					</div>


					
					
                    <form th:action="@{/login}" method="post">

                        <div class="mt-3">
                            <label for="username" class="form-label">Employee Id</label>
                            <input type="text" name="username" id="username" 
                                   class="form-control">
                        </div>

                        <div class="mt-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" 
                                   class="form-control">
                        </div>

                        <div class="text-center mt-4">
                            <input type="submit" value="Login" 
                             class="btn btn-primary w-200">
                        </div>
						
						<P style="text-align: center">Dont't have an account ?<a th:href ="@{ /forgot-password}">Forget Password</a></p>
							

                    </form>
					<hr>
					<div style="font-size:24px; cursor:pointer;"class= "container text-center">
						
						<i class="fa-brands fa-facebook" style="color:#1877F2; "></i>
						<i  style="color:#DB4437; " class=" fa-brands fa-google"></i>
						<i  style="color:black; " class=" fa-brands fa-apple"></i>
						<i  style="color:#FF00BF; " class=" fa-brands fa-instagram"></i>
					</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
