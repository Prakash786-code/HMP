<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .card-box {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
            background: white;
        }

        .card-box img {
            width: 60px;
        }

        .social-icons i {
            font-size: 20px;
            margin: 0 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card-box text-center">

    <!-- Icon -->
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="user">

    <h5 class="mt-3 mb-4">Request for new password</h5>

    <!-- Form -->
    <form>

        <div class="mb-3 text-start">
            <label class="form-label">Employee Id</label>
            <input type="text" class="form-control" placeholder="Enter Employee Id">
        </div>

        <div class="mb-3 text-start">
            <label class="form-label">Write Comment for request</label>
            <textarea class="form-control" rows="3" placeholder="Write Here"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Send Request <i class="fa-solid fa-paper-plane"></i>
        </button>

    </form>

    <p class="mt-3">
        If You have an account ?
        <a th:href="@{/login}">Login Here</a>
    </p>

    <hr>

    
    <div class="social-icons">
        <i class="fa-brands fa-facebook text-primary"></i>
        <i class="fa-brands fa-google text-danger"></i>
        <i class="fa-brands fa-github text-dark"></i>
        <i class="fa-brands fa-apple text-black"></i>
        <i class="fa-brands fa-instagram text-danger"></i>
    </div>

</div>

</body>
</html>
