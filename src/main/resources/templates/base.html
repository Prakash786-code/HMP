<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout">

<head>
    <title>HR Management Portal</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <!-- DataTables CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet"
          href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        body { overflow-x: hidden; }

        .sidebar a {
            display: block;
            padding: 10px 15px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar a:hover {
            background-color: #f1f1f1;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark bg-danger fixed-top">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="#">
            HR Management Portal
        </a>

        <!-- Profile Dropdown -->
        <div class="dropdown">

            <a href="#"
               class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
               data-bs-toggle="dropdown">

                <img src="https://tse4.mm.bing.net/th/id/OIP.eU8MYLNMRBadK-YgTT6FJQHaHw?pid=Api&P=0&h=180"
                     class="rounded-circle border border-white"
                     width="38"
                     height="38">
            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow">

                <li class="text-center p-3 border-bottom bg-light"
                    th:if="${employee != null}">
                    <i class="fas fa-user-circle fa-3x text-secondary mb-2"></i>
                    <div>
                        <strong th:text="${employee.employeeName}"></strong><br>
                        <small class="text-muted"
                               th:text="${employee.designation}"></small>
                    </div>
                </li>

                <li><hr class="dropdown-divider"></li>

                <li>
                    <a class="dropdown-item"
                       th:href="@{/my-profile}">
                        <i class="fas fa-user me-2 text-primary"></i>
                        My Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item text-danger"
                       th:href="@{/logout}">
                        <i class="fas fa-sign-out-alt me-2"></i>
                        Log out
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<!-- ================= MAIN LAYOUT ================= -->
<div class="container-fluid" style="margin-top:70px;">
    <div class="row">

        <!-- ===== SIDEBAR (Desktop Only) ===== -->
        <nav class="col-md-2 d-none d-md-block bg-light vh-100 pt-3 border-end sidebar">

            <a th:href="@{/dash-board}">
                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
            </a>

            <a th:href="@{/add-employee}">
                <i class="fas fa-user-plus me-2"></i> Add Employee
            </a>

            <a th:href="@{/all-employee}">
                <i class="fas fa-users me-2"></i> All Employee
            </a>

            <a th:href="@{/create-post}">
                <i class="fas fa-pencil-alt me-2"></i> Create Post
            </a>

            <a th:href="@{/status}">
                <i class="fas fa-tasks me-2"></i> Status
            </a>

            <a th:href="@{/setting}">
                <i class="fas fa-cog me-2"></i> Setting
            </a>

        </nav>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="col-md-10 col-12 p-4"
              style="background:#f8f9fa; min-height:100vh; padding-bottom:100px;">

            <div th:insert="~{::section}"></div>

        </main>

    </div>
</div>

<!-- ================= MOBILE BOTTOM NAV ================= -->
<nav class="navbar navbar-light bg-white border-top fixed-bottom d-md-none shadow-sm">
    <div class="container-fluid d-flex justify-content-around text-center">

        <a th:href="@{/dash-board}" class="text-dark small text-decoration-none">
            <i class="fas fa-tachometer-alt d-block"></i>
            Dashboard
        </a>

        <a th:href="@{/add-employee}" class="text-dark small text-decoration-none">
            <i class="fas fa-user-plus d-block"></i>
            Add
        </a>

        <a th:href="@{/all-employee}" class="text-dark small text-decoration-none">
            <i class="fas fa-users d-block"></i>
            Employees
        </a>

        <a th:href="@{/status}" class="text-dark small text-decoration-none">
            <i class="fas fa-tasks d-block"></i>
            Status
        </a>

        <a th:href="@{/setting}" class="text-dark small text-decoration-none">
            <i class="fas fa-cog d-block"></i>
            Setting
        </a>

    </div>
</nav>

<!-- ================= SCRIPTS ================= -->

<!-- jQuery (Load First) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<!-- Buttons -->
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

<!-- Export Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- DataTable Init -->
<script>
$(document).ready(function() {
    $('#example').DataTable({
        dom: 'Bfrtip',
        buttons: ['csv','excel','pdf']
    });
});
</script>

<!-- Confirm Delete -->
<script>
function confirmDelete(id) {
    Swal.fire({
        title: 'Are You Sure?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, Delete'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '/delete-employee/' + id;
        }
    });
}
</script>

<!-- Approve -->
<script>
function approved(id) {
    Swal.fire({
        title: 'Approve Request?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/update-status/" + id + "/approved";
        }
    });
}
</script>

<!-- Reject -->
<script>
function rejected(id) {
    Swal.fire({
        title: 'Reject Request?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/update-status/" + id + "/denied";
        }
    });
}


</script>

<script th:src="@{/js/emp.js}"></script>

</body>
</html>
